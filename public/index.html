<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xmechanicals</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f6fa;
      --surface: #ffffff;
      --surface2: #f0f3fa;
      --border: #d9e1f0;
      --text: #1f2a3d;
      --muted: #6b7280;
      --accent: #2d5bff;
      --accent2: #7c5cff;
      --ok: #0f8f4d;
      --warn: #c27300;
      --danger: #dc2626;
      --rough: #ea6c00;
      --trim: #2563eb;
      --startup: #7c3aed;
      --warranty: #059669;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Layout ── */
    .shell { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Top Bar ── */
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 4px rgba(30,50,100,0.06);
    }
    .topbar-logo { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; color: var(--text); cursor: pointer; transition: opacity 0.15s; }
    .topbar-logo:hover { opacity: 0.75; }
    .topbar-logo span { color: var(--accent); }

    /* ── Nav Menu ── */
    .nav-menu { display: flex; align-items: center; gap: 2px; }
    .nav-item {
      padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      border: none; background: none; font-family: 'DM Sans', sans-serif;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(45,91,255,0.08); }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); flex: 1; overflow: hidden;
    }
    .breadcrumb-item { cursor: pointer; color: var(--muted); white-space: nowrap; transition: color 0.15s; }
    .breadcrumb-item:hover { color: var(--text); }
    .breadcrumb-item.active { color: var(--text); font-weight: 600; }
    .breadcrumb-sep { color: var(--border); }
    .topbar-actions { display: flex; gap: 8px; }

    /* ── Main Content ── */
    .main { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ── Page Header ── */
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* ── Cards Grid ── */
    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .grid-1 { grid-template-columns: 1fr; }

    /* ── Entity Card ── */
    .entity-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 8px rgba(30,50,100,0.05);
    }
    .entity-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,91,255,0.12); }
    .entity-card.selected { border-color: var(--accent); background: #f0f4ff; }
    .entity-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: 12px 12px 0 0; }
    .entity-card-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .entity-card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
    .entity-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .meta-item { font-size: 12px; color: var(--muted); }
    .meta-item strong { color: var(--text); }
    .entity-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .entity-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .go-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; color: var(--accent);
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.3);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all 0.15s;
    }
    .go-btn:hover { background: rgba(79,124,255,0.2); }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .badge-draft { background: #f0f2f7; color: #5a667d; }
    .badge-progress { background: #e7edff; color: #2d4fcc; }
    .badge-complete { background: #e8f8ef; color: #0f8f4d; }
    .badge-warn { background: #fff4dd; color: #c27300; }

    /* ── Phase Cards ── */
    .phase-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(30,50,100,0.05);
    }
    .phase-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; transition: background 0.15s;
    }
    .phase-card-header:hover { background: var(--surface2); }
    .phase-card-header.expanded { background: var(--surface2); }
    .phase-left { display: flex; align-items: center; gap: 12px; }
    .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .phase-dot-rough { background: var(--rough); }
    .phase-dot-trim { background: var(--trim); }
    .phase-dot-startup { background: var(--startup); }
    .phase-dot-warranty { background: var(--warranty); }
    .phase-name { font-size: 14px; font-weight: 700; text-transform: capitalize; letter-spacing: 0.3px; }
    .phase-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .phase-right { display: flex; align-items: center; gap: 10px; }
    .wo-count { font-size: 12px; color: var(--muted); }
    .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }
    .phase-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .phase-body.open { display: block; }

    /* ── Work Order Row ── */
    .wo-row {
      display: grid;
      grid-template-columns: 110px 1fr 90px 120px 120px 85px 80px 75px 70px;
      gap: 8px; align-items: center;
      padding: 10px 12px; border-radius: 8px; margin-top: 8px;
      background: var(--bg); border: 1px solid var(--border);
      font-size: 13px; transition: border-color 0.15s;
    }
    .wo-row:hover { border-color: var(--accent); }
    .wo-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }
    .wo-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wo-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .wo-header-row {
      display: grid;
      grid-template-columns: 110px 1fr 90px 120px 120px 85px 80px 75px 70px;
      gap: 8px; padding: 6px 12px; margin-top: 12px;
      font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── Buttons ── */
    .btn { border-radius: 8px; border: 1px solid transparent; padding: 8px 14px; font-weight: 600; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3d6aff; }
    .btn-outline { background: transparent; color: var(--accent); border-color: rgba(79,124,255,0.4); }
    .btn-outline:hover { background: rgba(79,124,255,0.1); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-danger { background: rgba(220,38,38,0.08); color: #dc2626; border-color: rgba(220,38,38,0.3); }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    /* ── Add WO Button ── */
    .add-wo-btn {
      display: flex; align-items: center; gap: 6px; width: 100%;
      margin-top: 10px; padding: 8px 12px; border-radius: 8px;
      border: 1px dashed var(--border); background: transparent;
      color: var(--muted); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .add-wo-btn:hover { border-color: var(--accent); color: var(--accent); background: #f0f4ff; }

    /* ── Bid Task Row ── */
    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; margin-top: 6px;
      background: var(--bg); border: 1px solid var(--border); font-size: 13px;
    }
    .task-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); min-width: 80px; }
    .task-name { flex: 1; font-weight: 500; }
    .task-user { color: var(--muted); font-size: 12px; min-width: 120px; }
    .task-priority-high { color: var(--danger); font-size: 11px; font-weight: 700; }
    .task-priority-medium { color: var(--warn); font-size: 11px; font-weight: 700; }
    .task-priority-low { color: var(--ok); font-size: 11px; font-weight: 700; }

    /* ── Empty State ── */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      margin-bottom: 16px; transition: color 0.15s;
      background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0;
    }
    .back-btn:hover { color: var(--text); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; padding: 20px; z-index: 200;
    }
    .modal {
      width: min(560px, 100%); background: var(--surface); border-radius: 16px;
      border: 1px solid var(--border); padding: 24px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(30,50,100,0.15);
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field select, .field textarea {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field select option { background: var(--surface); color: var(--text); }
    textarea { min-height: 80px; resize: vertical; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Step indicator ── */
    .steps { display: flex; gap: 0; margin-bottom: 24px; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .step-active .step-num { background: var(--accent); color: #fff; }
    .step-done .step-num { background: var(--ok); color: #fff; }
    .step-inactive .step-num { background: var(--surface2); color: var(--muted); }
    .step-active .step-label { color: var(--text); font-weight: 600; }
    .step-done .step-label { color: var(--ok); }
    .step-inactive .step-label { color: var(--muted); }
    .step-arrow { color: var(--border); margin: 0 8px; font-size: 14px; }

    /* ── Info box ── */
    .info-box { background: #f0f4ff; border: 1px solid #c5d3f8; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; }
    .info-box p { color: var(--muted); margin: 3px 0; }
    .info-box strong { color: var(--text); }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-logo" onclick="routeTo('home')">X<span>mechanicals</span></div>
    <div class="nav-menu" id="navMenu">
      <button class="nav-item" onclick="routeTo('bids')">📋 Bids</button>
      <button class="nav-item" onclick="routeTo('projects')">🏗️ Projects</button>
      <button class="nav-item" onclick="routeTo('tasks')">✅ Tasks</button>
    </div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="reloadData()">↺ Refresh</button>
    </div>
  </div>
  <div class="main">
    <div id="app"></div>
  </div>
</div>
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent"></div>
</div>
<script src="/app.js?v=5"></script>
</body>
</html>
